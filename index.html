<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TH & THCS PHƯỚC AN - SAO ĐỎ</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--blue:#3b82f6;
--red:#ef4444;
--green:#22c55e;
--gray:#94a3b8;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:var(--bg);
color:white;
}

#login{
position:fixed;
inset:0;
background:linear-gradient(135deg,#1e3a8a,#2563eb);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#login h1{
font-size:35px;
margin-bottom:20px;
}

#login input{
padding:15px;
font-size:22px;
border:none;
border-radius:12px;
text-align:center;
}

#app{
display:none;
padding:15px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.menu button{
padding:10px 15px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-bottom:20px;
animation:fade .3s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

th{
background:#0f172a;
}

input{
width:100%;
padding:6px;
background:#0f172a;
border:1px solid #334155;
border-radius:6px;
color:white;
}

.class-select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
font-weight:bold;
}

.plus{
color:var(--green);
font-weight:bold;
}

.minus{
color:var(--red);
font-weight:bold;
}

.btn-save{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:var(--green);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.btn-view{
padding:6px 12px;
border:none;
border-radius:6px;
background:#475569;
color:white;
cursor:pointer;
}

#modalHistory{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:10000;
overflow-y:auto;
padding:20px;
}

.modal-content{
background:var(--card);
max-width:900px;
margin:30px auto;
padding:20px;
border-radius:15px;
position:relative;
}

.close-modal{
position:absolute;
right:15px;
top:10px;
font-size:30px;
cursor:pointer;
}

.history-menu{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.history-menu button{
padding:10px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
font-weight:bold;
cursor:pointer;
}

.rank-title{
font-size:22px;
font-weight:bold;
color:#60a5fa;
margin-bottom:10px;
}

</style>
</head>
<body>

<div id="login">

<h1>SAO ĐỎ PHƯỚC AN</h1>

<input
type="password"
id="pin"
placeholder="Nhập PIN">

</div>

<div id="app">

<div class="topbar">

<h2>TH & THCS PHƯỚC AN</h2>

<div class="menu">

<button onclick="showRank()">
BXH Tuần
</button>

<button onclick="showMonthRank()">
BXH Tháng
</button>

<button onclick="showYearRank()">
BXH Năm
</button>

<button onclick="showScore()">
Chấm điểm
</button>

</div>

</div>

<div id="rankView" class="card"></div>

<div id="monthRankView"
class="card"
style="display:none">
</div>

<div id="yearRankView"
class="card"
style="display:none">
</div>

<div id="scoreView"
class="card"
style="display:none">
</div>

</div>

<div id="modalHistory">

<div class="modal-content">

<span
class="close-modal"
onclick="closeModal()">

&times;

</span>

<h2 id="modalTitle"></h2>

<div class="history-menu">

<button onclick="showWeekHistory()">
📅 Tuần
</button>

<button onclick="showMonthHistory()">
📆 Tháng
</button>

<button onclick="showYearHistory()">
🏆 Năm
</button>

</div>

<div id="historyContent"></div>

</div>

</div>

<script>
    const PIN="1234";

const LOPS=[

"6A","6B","6C","6D",

"7A","7B","7C","7D",

"8A","8B","8C",

"9A","9B"

];

const LOIS=[

{n:"Khăn quàng/Huy hiệu",d:-5},

{n:"Đồng phục/Bỏ áo vào quần",d:-5},

{n:"Đi trễ",d:-2},

{n:"Vắng không phép",d:-5},

{n:"Nói tục/Chửi thề",d:-10},

{n:"Đánh nhau",d:-50},

{n:"Xả rác/Vệ sinh",d:-20},

{n:"Trực nhật bẩn",d:-10},

{n:"Không thuộc bài",d:-10},

{n:"Điểm 7",d:5},

{n:"Điểm 8-9",d:7},

{n:"Điểm 10",d:10},

{n:"Phong trào",d:10}

];

let DB=
JSON.parse(
localStorage.getItem(
"PHUOCAN_DB"
)
)||{};

LOPS.forEach(l=>{

if(!DB[l]){

DB[l]={

total:100,

weeks:[],

months:[],

years:[],

monthPoint:0,

yearPoint:0

};

}

});

let currentClass="";

function saveDB(){

localStorage.setItem(
"PHUOCAN_DB",
JSON.stringify(DB)
);

}
    document
.getElementById("pin")
.addEventListener(
"input",
function(){

if(this.value===PIN){

document
.getElementById("login")
.style.display="none";

document
.getElementById("app")
.style.display="block";

renderRank();

renderMonthRank();

renderYearRank();

renderScore();

}

}
);

function hideAll(){

document.getElementById(
"rankView"
).style.display="none";

document.getElementById(
"monthRankView"
).style.display="none";

document.getElementById(
"yearRankView"
).style.display="none";

document.getElementById(
"scoreView"
).style.display="none";

}

function showRank(){

hideAll();

document.getElementById(
"rankView"
).style.display="block";

renderRank();

}

function showMonthRank(){

hideAll();

document.getElementById(
"monthRankView"
).style.display="block";

renderMonthRank();

}

function showYearRank(){

hideAll();

document.getElementById(
"yearRankView"
).style.display="block";

renderYearRank();

}

function showScore(){

hideAll();

document.getElementById(
"scoreView"
).style.display="block";

renderScore();

}
    function renderRank(){

let html=`

<div class="rank-title">

BXH TUẦN

</div>

<table>

<tr>

<th>Hạng</th>

<th>Lớp</th>

<th>Điểm</th>

<th>Lịch sử</th>

</tr>

`;

let arr=[...LOPS];

arr.sort(
(a,b)=>
DB[b].total-
DB[a].total
);

arr.forEach((l,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td><b>${l}</b></td>

<td>

${DB[l].total}

</td>

<td>

<button
class="btn-view"
onclick="openModal('${l}')">

Xem

</button>

</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"rankView"
)
.innerHTML=html;

saveDB();

}
    function renderMonthRank(){

let html=`

<div class="rank-title">
BXH THÁNG
</div>

<table>
<tr>
<th>Hạng</th>
<th>Lớp</th>
<th>Điểm tháng</th>
</tr>

`;

let arr=[...LOPS];

arr.sort(
(a,b)=>
(DB[b].monthPoint||0)-
(DB[a].monthPoint||0)
);

arr.forEach((l,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${l}</td>

<td>
${DB[l].monthPoint||0}
</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"monthRankView"
)
.innerHTML=html;

}

function renderYearRank(){

let html=`

<div class="rank-title">
BXH NĂM
</div>

<table>

<tr>

<th>Hạng</th>

<th>Lớp</th>

<th>Điểm năm</th>

</tr>

`;

let arr=[...LOPS];

arr.sort(
(a,b)=>
(DB[b].yearPoint||0)-
(DB[a].yearPoint||0)
);

arr.forEach((l,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${l}</td>

<td>
${DB[l].yearPoint||0}
</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"yearRankView"
)
.innerHTML=html;

}
    function renderScore(){

let html=`

<h3>SỔ CHẤM ĐIỂM</h3>

<select
class="class-select"
id="lopSelect">

${LOPS.map(l=>
`<option value="${l}">
${l}
</option>`
).join("")}

</select>

<table>

<tr>

<th>Nội dung</th>

<th>Tên HS</th>

<th>Số lần</th>

<th>Điểm</th>

</tr>

`;

LOIS.forEach((loi,i)=>{

html+=`

<tr>

<td style="text-align:left">

${loi.n}

</td>

<td>

<input
id="ten${i}"
type="text">

</td>

<td>

<input
id="sl${i}"
type="number"
value="0"
min="0"
oninput="calc()">

</td>

<td id="diem${i}">
0
</td>

</tr>

`;

});

html+=`

<tr>

<td colspan="3">

<b>TỔNG TUẦN</b>

</td>

<td id="tongPhien">

0

</td>

</tr>

</table>

<button
class="btn-save"
onclick="saveWeek()">

XÁC NHẬN LƯU TUẦN

</button>

`;

document
.getElementById(
"scoreView"
)
.innerHTML=html;

}

function calc(){

let tong=0;

LOIS.forEach((loi,i)=>{

let sl=parseInt(
document.getElementById(
"sl"+i
).value
)||0;

let diem=sl*loi.d;

document
.getElementById(
"diem"+i
)
.innerText=diem;

tong+=diem;

});

document
.getElementById(
"tongPhien"
)
.innerText=tong;

}
    function saveWeek(){

let lop=
document
.getElementById(
"lopSelect"
)
.value;

let tong=
parseInt(
document
.getElementById(
"tongPhien"
)
.innerText
)||0;

if(
!confirm(
`Lưu ${tong} điểm cho ${lop}?`
)
){
return;
}

DB[lop].total+=tong;

DB[lop].weeks.push({

date:new Date()
.toLocaleDateString(
"vi-VN"
),

score:tong

});

if(
DB[lop].weeks.length>35
){

DB[lop].weeks.shift();

}

let weekCount=
DB[lop].weeks.length;

if(
weekCount%4===0
){

let last4=
DB[lop].weeks
.slice(-4);

let monthScore=
last4.reduce(
(a,b)=>
a+b.score,
0
);

DB[lop].monthPoint=
monthScore;

DB[lop].months.push({

date:new Date()
.toLocaleDateString(
"vi-VN"
),

score:monthScore

});

alert(
`${lop} đã đủ 4 tuần và được tạo tháng mới`
);

}

if(
DB[lop].months.length>12
){

DB[lop].months.shift();

}

if(
DB[lop].months.length>0
&&
DB[lop].months.length%12===0
){

let last12=
DB[lop].months
.slice(-12);

let yearScore=
last12.reduce(
(a,b)=>
a+b.score,
0
);

DB[lop].yearPoint=
yearScore;

DB[lop].years.push({

date:new Date()
.toLocaleDateString(
"vi-VN"
),

score:yearScore

});

alert(
`${lop} đã đủ 12 tháng và được tạo năm mới`
);

}

saveDB();

renderRank();

renderMonthRank();

renderYearRank();

renderScore();

showRank();

}
    function openModal(lop){

currentClass=lop;

document
.getElementById(
"modalHistory"
)
.style.display="block";

document
.getElementById(
"modalTitle"
)
.innerText=
"Lịch sử lớp "+lop;

showWeekHistory();

}

function closeModal(){

document
.getElementById(
"modalHistory"
)
.style.display="none";

}

function showWeekHistory(){

let data=
DB[currentClass];

let html=`

<h3>📅 Lịch sử tuần</h3>

<table>

<tr>

<th>STT</th>

<th>Ngày</th>

<th>Điểm</th>

</tr>

`;

data.weeks.forEach((w,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${w.date}</td>

<td>${w.score}</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"historyContent"
)
.innerHTML=html;

}

function showMonthHistory(){

let data=
DB[currentClass];

let html=`

<h3>📆 Lịch sử tháng</h3>

<table>

<tr>

<th>STT</th>

<th>Ngày</th>

<th>Điểm</th>

</tr>

`;

data.months.forEach((m,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${m.date}</td>

<td>${m.score}</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"historyContent"
)
.innerHTML=html;

}

function showYearHistory(){

let data=
DB[currentClass];

let html=`

<h3>🏆 Lịch sử năm</h3>

<table>

<tr>

<th>STT</th>

<th>Ngày</th>

<th>Điểm</th>

</tr>

`;

data.years.forEach((y,i)=>{

html+=`

<tr>

<td>${i+1}</td>

<td>${y.date}</td>

<td>${y.score}</td>

</tr>

`;

});

html+="</table>";

document
.getElementById(
"historyContent"
)
.innerHTML=html;

}

</script>

</body>
</html>
