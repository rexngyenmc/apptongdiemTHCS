<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAO ĐỎ PHƯỚC AN PRO</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--blue:#3b82f6;
--green:#22c55e;
--red:#ef4444;
--gray:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:white;
font-family:Segoe UI,sans-serif;
}

#login{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(
135deg,
#1e3a8a,
#2563eb
);
z-index:9999;
}

#login h1{
margin-bottom:20px;
}

#login input{
padding:15px;
font-size:22px;
border:none;
border-radius:10px;
text-align:center;
}

#app{
display:none;
padding:15px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.menu{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.menu button{
padding:10px 15px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
cursor:pointer;
font-weight:bold;
}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:13px;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

th{
background:#0f172a;
}

input{
width:100%;
padding:6px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

.class-select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--blue);
color:white;
font-weight:bold;
margin-bottom:15px;
}

.plus{
color:var(--green);
font-weight:bold;
}

.minus{
color:var(--red);
font-weight:bold;
}

.btn-save{
width:100%;
padding:15px;
background:var(--green);
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.btn-view{
padding:5px 10px;
border:none;
border-radius:5px;
background:#475569;
color:white;
cursor:pointer;
}

#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:999;
overflow:auto;
padding:20px;
}

.modal-content{
background:var(--card);
max-width:900px;
margin:auto;
padding:20px;
border-radius:15px;
position:relative;
}

.close{
position:absolute;
right:15px;
top:10px;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="login">

<h1>SAO ĐỎ PHƯỚC AN</h1>

<input
type="password"
id="pin"
placeholder="Nhập PIN">

</div>

<div id="app">

<div class="topbar">

<h2>PHƯỚC AN</h2>

<div class="menu">

<button onclick="showWeekRank()">
BXH TUẦN
</button>

<button onclick="showMonthRank()">
BXH THÁNG
</button>

<button onclick="showWeekHistory()">
LỊCH SỬ TUẦN
</button>

<button onclick="showScore()">
CHẤM ĐIỂM
</button>

</div>

</div>

<div id="mainView"
class="card">
</div>

<div id="scoreView"
class="card"
style="display:none">
</div>

</div>

<div id="modal">

<div class="modal-content">

<span
class="close"
onclick="closeModal()">

&times;

</span>

<div id="modalBody">
</div>

</div>

</div>
<script>

const PIN="1234";

const LOPS=[
"6A","6B","6C","6D",
"7A","7B","7C","7D",
"8A","8B","8C",
"9A","9B"
];

const LOIS=[

{n:"Khăn quàng/Huy hiệu",d:-5},
{n:"Đồng phục/Bỏ áo vào quần",d:-5},
{n:"Đi trễ",d:-2},
{n:"Vắng không phép",d:-5},
{n:"Nói tục/Chửi thề",d:-10},
{n:"Đánh nhau",d:-50},
{n:"Xả rác/Vệ sinh",d:-20},
{n:"Trực nhật bẩn",d:-10},
{n:"Không thuộc bài",d:-10},

{n:"Điểm 7",d:5},
{n:"Điểm 8-9",d:7},
{n:"Điểm 10",d:10},
{n:"Phong trào",d:10}

];

let DB=
JSON.parse(
localStorage.getItem(
"PHUOCAN_NEW"
)
)||{

weekNumber:1,

monthNumber:1,

weekHistory:[],

monthHistory:[],

classes:{}

};

LOPS.forEach(l=>{

if(!DB.classes[l]){

DB.classes[l]={

current:100,

weekScores:[],
monthScores:[]

};

}

});

function saveDB(){

localStorage.setItem(
"PHUOCAN_NEW",
JSON.stringify(DB)
);

}

document
.getElementById("pin")
.addEventListener(
"input",
function(){

if(
this.value===PIN
){

document
.getElementById("login")
.style.display="none";

document
.getElementById("app")
.style.display="block";

showWeekRank();

renderScore();

}

}
);

function showWeekRank(){

document
.getElementById("scoreView")
.style.display="none";

document
.getElementById("mainView")
.style.display="block";

let arr=[...LOPS];

arr.sort(
(a,b)=>
DB.classes[b].current-
DB.classes[a].current
);

let html=`

<h2>
BXH TUẦN
</h2>

<p>
Tuần hiện tại:
<b>${DB.weekNumber}</b>
</p>

<table>

<tr>

<th>Hạng</th>
<th>Lớp</th>
<th>Điểm</th>

</tr>

`;

arr.forEach((lop,i)=>{

html+=`

<tr>

<td>
${i+1}
</td>

<td>
${lop}
</td>

<td>

${DB.classes[lop].current}

</td>

</tr>

`;

});

html+=`

</table>

`;

document
.getElementById("mainView")
.innerHTML=html;

}

function showMonthRank(){

document
.getElementById("scoreView")
.style.display="none";

document
.getElementById("mainView")
.style.display="block";

let latest=[];

if(
DB.monthHistory.length>0
){

latest=
DB.monthHistory[
DB.monthHistory.length-1
].ranking;

}

let html=`

<h2>
BXH THÁNG
</h2>

<p>

Số tháng đã tạo:
<b>

${DB.monthHistory.length}

</b>

</p>

`;

if(latest.length===0){

html+=`

<p>

Chưa đủ 4 tuần
để tạo tháng.

</p>

`;

}else{

html+=`

<table>

<tr>

<th>Hạng</th>
<th>Lớp</th>
<th>Điểm tháng</th>

</tr>

`;

latest.forEach(r=>{

html+=`

<tr>

<td>${r.rank}</td>

<td>${r.lop}</td>

<td>${r.score}</td>

</tr>

`;

});

html+=`

</table>

`;

}

document
.getElementById("mainView")
.innerHTML=html;

}
    function showScore(){

document
.getElementById("mainView")
.style.display="none";

document
.getElementById("scoreView")
.style.display="block";

renderScore();

}

function renderScore(){

let html=`

<h2>CHẤM ĐIỂM TUẦN</h2>

<select
id="lopSelect"
class="class-select">

${LOPS.map(
l=>`<option value="${l}">
${l}
</option>`
).join("")}

</select>

<table>

<tr>
<th>Nội dung</th>
<th>Số lần</th>
<th>Điểm</th>
</tr>

`;

LOIS.forEach((loi,i)=>{

html+=`

<tr>

<td style="text-align:left">
${loi.n}
</td>

<td>

<input
type="number"
value="0"
min="0"
id="sl${i}"
oninput="calc()">

</td>

<td id="diem${i}">
0
</td>

</tr>

`;

});

html+=`

<tr>

<td colspan="2">
<b>TỔNG</b>
</td>

<td id="tongPhien">
0
</td>

</tr>

</table>

<button
class="btn-save"
onclick="saveScore()">

CỘNG ĐIỂM CHO LỚP

</button>

<hr style="margin:15px 0">

<button
class="btn-save"
onclick="saveWeek()">

💾 LƯU TUẦN

</button>

`;

document
.getElementById(
"scoreView"
).innerHTML=html;

}

function calc(){

let tong=0;

LOIS.forEach((loi,i)=>{

let sl=parseInt(
document.getElementById(
"sl"+i
).value
)||0;

let diem=
sl*loi.d;

document
.getElementById(
"diem"+i
)
.innerText=diem;

tong+=diem;

});

document
.getElementById(
"tongPhien"
)
.innerText=tong;

}

function saveScore(){

let lop=
document
.getElementById(
"lopSelect"
)
.value;

let tong=
parseInt(
document
.getElementById(
"tongPhien"
)
.innerText
)||0;

DB.classes[lop].current+=tong;

saveDB();

alert(
`Đã cập nhật
${tong} điểm cho lớp ${lop}`
);

renderScore();

}

function saveWeek(){

if(
!confirm(
"Lưu tuần hiện tại?"
)
)return;

let ranking=[...LOPS]

.map(l=>({

lop:l,

score:
DB.classes[l].current

}))

.sort(
(a,b)=>
b.score-a.score
);

ranking.forEach(
(r,i)=>{

r.rank=i+1;

}
);

DB.weekHistory.push({

week:
DB.weekNumber,

ranking:
ranking

});

if(
DB.weekHistory.length>35
){

DB.weekHistory.shift();

}

LOPS.forEach(l=>{

DB.classes[l]
.weekScores
.push(
DB.classes[l]
.current
);

});

DB.weekNumber++;

LOPS.forEach(l=>{

DB.classes[l]
.current=100;

});

saveDB();

checkCreateMonth();

alert(
"Đã lưu tuần thành công!"
);

showWeekRank();

}
    function showWeekHistory(){

document
.getElementById("scoreView")
.style.display="none";

document
.getElementById("mainView")
.style.display="block";

let html=`

<h2>
LỊCH SỬ 35 TUẦN GẦN NHẤT
</h2>

`;

if(
DB.weekHistory.length===0
){

html+=`
<p>
Chưa có dữ liệu.
</p>
`;

}else{

DB.weekHistory
.slice()
.reverse()
.forEach(w=>{

html+=`

<div
style="
margin-bottom:20px;
padding:10px;
background:#0f172a;
border-radius:10px;
">

<h3>
Tuần ${w.week}
</h3>

<table>

<tr>

<th>Hạng</th>
<th>Lớp</th>
<th>Điểm</th>

</tr>

`;

w.ranking.forEach(r=>{

html+=`

<tr>

<td>${r.rank}</td>

<td>${r.lop}</td>

<td>${r.score}</td>

</tr>

`;

});

html+=`

</table>

</div>

`;

});

}

document
.getElementById(
"mainView"
)
.innerHTML=html;

}

function checkCreateMonth(){

let enough=true;

LOPS.forEach(l=>{

if(
DB.classes[l]
.weekScores.length<4
){

enough=false;

}

});

if(!enough){

saveDB();
return;

}

let ranking=[];

LOPS.forEach(l=>{

let arr=
DB.classes[l]
.weekScores;

let last4=
arr.slice(-4);

let tong=
last4.reduce(
(a,b)=>a+b,
0
);

DB.classes[l]
.monthScores
.push(tong);

ranking.push({

lop:l,

score:tong

});

});

ranking.sort(
(a,b)=>
b.score-a.score
);

ranking.forEach(
(r,i)=>{

r.rank=i+1;

}
);

DB.monthHistory.push({

month:
DB.monthNumber,

ranking:
ranking

});

DB.monthNumber++;

saveDB();

alert(

"Đã đủ 4 tuần!\n\n" +

"BXH THÁNG ĐÃ ĐƯỢC TẠO."

);

}
    function openMonthDetail(index){

let monthData=
DB.monthHistory[index];

let html=`

<h2>
BXH THÁNG ${monthData.month}
</h2>

<table>

<tr>

<th>Hạng</th>
<th>Lớp</th>
<th>Điểm tháng</th>

</tr>

`;

monthData.ranking.forEach(r=>{

html+=`

<tr>

<td>${r.rank}</td>

<td>${r.lop}</td>

<td>${r.score}</td>

</tr>

`;

});

html+=`
</table>
`;

document
.getElementById(
"modalBody"
)
.innerHTML=html;

document
.getElementById(
"modal"
)
.style.display="block";

}

function closeModal(){

document
.getElementById(
"modal"
)
.style.display="none";

}

window.onclick=function(e){

if(
e.target===
document.getElementById(
"modal"
)
){

closeModal();

}

};

function showMonthRank(){

document
.getElementById(
"scoreView"
)
.style.display="none";

document
.getElementById(
"mainView"
)
.style.display="block";

let html=`

<h2>
BẢNG XẾP HẠNG THÁNG
</h2>

`;

if(
DB.monthHistory.length===0
){

html+=`

<p>
Chưa có BXH tháng nào.
</p>

`;

}else{

DB.monthHistory
.slice()
.reverse()
.forEach((m,idx)=>{

html+=`

<div
style="
padding:10px;
margin-bottom:10px;
background:#0f172a;
border-radius:10px;
">

<b>
Tháng ${m.month}
</b>

<button
class="btn-view"
style="float:right"
onclick="openMonthDetail(
${DB.monthHistory.length-1-idx}
)">

Xem

</button>

</div>

`;

});

}

document
.getElementById(
"mainView"
)
.innerHTML=html;

}

showWeekRank();

</script>

</body>
</html>
